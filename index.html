<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BUS 209 – Commercial Law Exam Notes | AFIT</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    /* HEADER */
    #header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-bottom: 1px solid #334155; padding: 20px 24px 0; }
    #header-inner { max-width: 900px; margin: 0 auto; }
    #course-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; }
    #main-title { font-size: 22px; font-weight: 800; color: #f1f5f9; margin-bottom: 20px; }

    /* TABS */
    #tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 0; }
    .tab-btn {
      padding: 10px 14px; border: none; border-radius: 8px 8px 0 0;
      cursor: pointer; font-weight: 700; font-size: 13px; white-space: nowrap;
      background: #1e293b; color: #94a3b8;
      border-bottom: 3px solid transparent; transition: all 0.15s;
    }
    .tab-btn.active { color: var(--accent); background: var(--color); border-bottom: 3px solid var(--accent); }

    /* CONTENT */
    #content { max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }
    #topic-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    #topic-emoji { font-size: 36px; }
    #topic-title { font-size: 24px; font-weight: 900; }
    #topic-sub { font-size: 12px; color: #64748b; margin-top: 2px; }

    /* SECTIONS */
    #sections { display: flex; flex-direction: column; gap: 10px; }
    .section-card { background: #1e293b; border-radius: 10px; border: 1px solid #334155; overflow: hidden; transition: border-color 0.2s; }
    .section-card.open { border-color: var(--color); }
    .section-btn {
      width: 100%; border: none; padding: 14px 16px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; font-weight: 700; font-size: 14px; text-align: left;
      background: transparent; color: #cbd5e1; transition: all 0.2s;
    }
    .section-btn.open { background: var(--color); color: var(--accent); }
    .section-btn .toggle { font-size: 18px; font-weight: 400; color: #475569; }
    .section-btn.open .toggle { color: var(--accent); }
    .section-body { padding: 14px 16px 16px; display: none; }
    .section-body.open { display: block; }
    .def-box {
      font-size: 14px; line-height: 1.65; color: #cbd5e1;
      background: #0f172a; padding: 10px 14px; border-radius: 8px;
      border-left: 3px solid var(--accent); margin-bottom: 12px;
    }
    .def-box:only-child { margin-bottom: 0; }
    .bullet-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .bullet-list li { display: flex; gap: 10px; align-items: flex-start; }
    .bullet-arrow { font-weight: 900; font-size: 16px; line-height: 1.4; flex-shrink: 0; color: var(--accent); }
    .bullet-text { font-size: 13.5px; line-height: 1.6; color: #cbd5e1; }

    /* FOOTER */
    #footer-tip { margin-top: 32px; padding: 14px 18px; background: #1e293b; border-radius: 10px; border: 1px solid #334155; font-size: 13px; color: #64748b; text-align: center; }
    #footer-tip strong { color: #94a3b8; }
  </style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <div id="course-label">BUS 209 · AFIT · Exam Prep</div>
    <h1 id="main-title">Commercial Law — Quick-Fire Notes</h1>
    <div id="tabs"></div>
  </div>
</div>

<div id="content">
  <div id="topic-header">
    <span id="topic-emoji"></span>
    <div>
      <div id="topic-title"></div>
      <div id="topic-sub"></div>
    </div>
  </div>
  <div id="sections"></div>
  <div id="footer-tip">💡 <strong>Exam Tip:</strong> Know your key cases, definitions, and the distinguishing features between topics. Good luck! 🎯</div>
</div>

<script>
const topics = [
  {
    id: 1, title: "Contract Law", emoji: "📜", color: "#1a3a5c", accent: "#e8c84a",
    sections: [
      { heading: "Definition", content: "A contract is an agreement between two or more parties which the law recognizes as binding and may enforce. Requires consensus ad idem (meeting of minds) reflected in offer and acceptance." },
      { heading: "Essential Elements (AILLC)", bullets: ["Agreement (Offer & Acceptance) – offer by offeror, accepted by offeree","Intention to Create Legal Relations – distinguishes contract from social/domestic agreements (Balfour v Balfour 1919)","Legality of Object – subject matter must be legal","Legal Capacity – parties must be of legal age and sound mind","Consideration – price paid for the promise; must move from promisee, not be illegal, vague, or past"] },
      { heading: "Types of Contract", bullets: ["Simple/Parol Contract – oral, written, or by conduct; needs consideration","Contract Under Seal (Formal) – signed, sealed, delivered; derives validity from formality alone","Contract of Record – court judgments and recognizances"] },
      { heading: "Offer Rules", bullets: ["Must be made to a definite person, class, or the public (Carlill v Carbolic Smoke Ball Co. 1892)","Must be communicated, definite, certain, and unequivocal","Offer ≠ Invitation to Treat (shop displays, catalogues, auction ads, tender requests)","Terminated by: revocation, rejection, lapse of time, death, or non-occurrence of event"] },
      { heading: "Acceptance Rules", bullets: ["Must be unqualified, absolute, and communicated to offeror","Must be made while offer is still in force","Invalid if: counter-offer, accepted in ignorance, or conditional ('subject to contract')"] },
      { heading: "Vitiating Elements", bullets: ["Mistake – Common (both mistaken → void), Unilateral (one party mistaken → voidable)","Misrepresentation – Innocent (rescind only), Fraudulent (rescind + damages), Negligent (rescind or affirm + damages)","Duress – actual threat of violence/imprisonment → voidable","Undue Influence – prevents free will → voidable"] },
      { heading: "Discharge of Contract", bullets: ["Performance – all obligations fulfilled","Agreement – parties mutually agree to end","Acceptance of Breach – aggrieved party accepts breach as termination","Frustration – impossibility due to changed circumstances (Robinson v Davidon 1871)","Statutory Impossibility / Destruction of Subject Matter"] },
      { heading: "Remedies for Breach (5)", bullets: ["Rescission – parties restored to status quo ante","Damages – monetary compensation for loss","Quantum Meruit – pay for work already done","Specific Performance – court orders party to perform","Injunction – court orders party to do or refrain from an act"] },
      { heading: "Key Cases to Know", bullets: ["Balfour v Balfour (1919) – domestic agreement not enforceable","Carlill v Carbolic Smoke Ball Co. (1892) – offer to the public is valid","Neale v Merrett (1930) – conditional acceptance = no contract","Nash v Inman (1908) – suits not necessaries for infant","Chandler v Webster (1904) – frustration loss stays where it fell"] }
    ]
  },
  {
    id: 2, title: "Company Law", emoji: "🏛️", color: "#1b4332", accent: "#74c69d",
    sections: [
      { heading: "Definition", content: "Company Law (Corporate Law) governs formation, operation, and dissolution of companies. A company is a legal entity with separate legal personality from its shareholders." },
      { heading: "Principal Governing Laws", bullets: ["Companies and Allied Matters Act (CAMA) 2020 – primary law","Investments and Securities Act (ISA) 2009","Nigerian Investment Promotion Commission (NIPC) Act","Foreign Exchange (Monitoring & Miscellaneous Provisions) Act"] },
      { heading: "Regulatory Bodies", bullets: ["Corporate Affairs Commission (CAC) – registration and regulation","Securities and Exchange Commission (SEC)","Nigerian Investment Promotion Commission (NIPC)"] },
      { heading: "Types of Business Organizations", bullets: ["Sole Proprietorship – one owner, bears all risk and profit","Partnership – 2–20 persons (lawyers/accountants exempt), jointly & severally liable","Statutory Companies – government-set, social purpose (e.g. NNPC, NRC)","Co-operative Societies – voluntary, mutual welfare","Incorporated Trustees – churches, clubs, associations (CAMA Part C, s.590-596)","Body Corporate (Registered Companies) – separate legal personality, perpetual succession"] },
      { heading: "Key Company Features", bullets: ["Separate legal personality (can sue and be sued)","Limited liability for shareholders","Perpetual succession (survives members)","Ability to own property and enter contracts"] },
      { heading: "Types of Directors", bullets: ["Shadow Director – no appointment, gives instructions directors follow (s.245(1) CAMA)","Executive/Special Director – has employment contract with company","Alternate Director – acts for substantive director during absence","Managing Director – appointed and removed by Board (s.64(b) CAMA)","Assignee Director – permanent delegation of powers","Interloper/Intermeddler – acts as director without proper appointment (s.245(3)&(4))"] },
      { heading: "Duties of Directors", bullets: ["Fiduciary Duty – act in utmost good faith (s.279 CAMA)","Duty of Care and Skill – act honestly, in good faith, as a reasonably prudent director would (s.282 CAMA)","Individual responsibility for Board actions even if absent (s.282(3))"] },
      { heading: "Winding Up – 3 Types", bullets: ["Court Winding Up – Federal High Court order (s.407 CAMA)","Members' Voluntary Winding Up – directors declare solvency; debts payable within 12 months","Creditors' Voluntary Winding Up – directors cannot declare solvency; creditors' meeting called, liquidator appointed"] },
      { heading: "Merger vs. Acquisition", bullets: ["Merger – amalgamation; the acquired company ceases to exist separately (ISA s.119)","Acquisition/Takeover – acquiring company gets control; target company survives as subsidiary (ISA s.117)"] }
    ]
  },
  {
    id: 3, title: "Partnership", emoji: "🤝", color: "#4a1942", accent: "#c77dff",
    sections: [
      { heading: "Definition", content: "Partnership Act 1890 (UK, statute of general application in Nigeria): 'a relationship which subsists between persons carrying on business in common with the view of making profit.' Lagos has its own Partnership Law 1994." },
      { heading: "What Does NOT Create Partnership (s.2(3))", bullets: ["Joint ownership of property alone","Sharing of gross returns only","Payment of debt by installments out of profit","Widow/child of deceased partner receiving profit share","Employee/agent paid a share of profit"] },
      { heading: "Creation & Numbers", bullets: ["No special formalities – oral, written, by conduct, or under seal (Deed)","Minimum 2 partners, Maximum 20 (lawyers and accountants excepted)","Firm name must be registered with CAC if not all partners' true surnames"] },
      { heading: "Rights & Duties of Partners (s.24 Partnership Act)", bullets: ["Equal share of capital, profits and losses (unless agreed otherwise)","No partner entitled to salary for acting in partnership business","No new partner introduced without unanimous consent","Daily matters resolved by majority; fundamental changes need unanimity","Partner contributing beyond capital share earns 5% interest on excess","Books kept at main office; all partners have access","Partner indemnified for expenses incurred on behalf of partnership"] },
      { heading: "Partners & Third Parties", bullets: ["Each partner is deemed agent of all co-partners","Implied authority: sell/buy partnership goods, receive payments, hire employees, borrow money, instruct solicitors","If partner pledges credit for non-partnership purpose → firm not bound unless authorized","Restriction on partner's power does not bind third party unaware of restriction","Firm liable for tort by partner in ordinary course of business"] },
      { heading: "Partnership vs. Limited Liability Company", bullets: ["Legal Personality: Company = separate legal person; Partnership = not a separate person","Liability: Company = limited to unpaid shares; Partnership = unlimited","Formalities: Company requires incorporation; Partnership needs no formality","Max Members: Partnership = 20; Company = unlimited"] },
      { heading: "Dissolution of Partnership", bullets: ["Without Court Order: term expired, notice given, death, bankruptcy, subject matter becomes illegal","By Court Order: insanity, permanent incapacity, willful breach, just and equitable grounds"] }
    ]
  },
  {
    id: 4, title: "Sale of Goods Law", emoji: "🛒", color: "#7f3300", accent: "#ffb347",
    sections: [
      { heading: "Definition", content: "Sale of Goods Act 1893 (UK, statute of general application). A contract of sale is where the seller transfers or agrees to transfer property in goods to the buyer for a money consideration (price)." },
      { heading: "Sale vs. Agreement to Sell", bullets: ["Sale – property passes immediately at time of contract (absolute)","Agreement to Sell – property passes at future time or upon fulfillment of condition","In Sale: buyer's risk from moment of contract; seller can sue for price if buyer refuses delivery","In Agreement to Sell: seller bears risk; can only sue for damages if goods are damaged"] },
      { heading: "Classification of Goods", bullets: ["Existing Goods – owned and possessed by seller at time of contract","Future Goods – to be manufactured or acquired by seller after contract","Unascertained Goods – sold by description, not identified at time (e.g. 20 bags from 1,000)","Specific/Ascertained Goods – identified and agreed upon at time of contract"] },
      { heading: "Implied Conditions in Every Sale", bullets: ["Description – goods must correspond to description (and sample if applicable)","Fitness for Particular Purpose – if buyer discloses purpose and relies on seller's skill","Merchantable Quality – goods must be fit for normal use (doesn't apply if buyer examined and missed obvious defects)","Sale by Sample – sample must match bulk; buyer gets chance to compare; no hidden defects"] },
      { heading: "Implied Warranties", bullets: ["Buyer shall have quiet possession of goods","Goods free from charges or encumbrances in favour of third party (unknown to buyer)"] },
      { heading: "Transfer of Title – Nemo Dat Rule", content: "Section 21: A seller cannot pass better title than he himself has (Nemo dat quod non habet – 'you cannot give what you don't have').", bullets: ["EXCEPTIONS: authorized by owner; statutory power/court order; sale by mercantile agent; seller in possession with document of title (buyer in good faith); buyer in possession (third party in good faith); voidable title (buyer in good faith) – Lewis v Averay (1972); sale in open/overt market (s.22)"] },
      { heading: "Remedies of Unpaid Seller", bullets: ["Lien – retain possession until price is paid","Stoppage in Transit – stop goods in transit if buyer becomes insolvent (s.44)","Right of Resale – if goods perishable, buyer given notice and fails to pay, or right reserved (s.48(2))","Action for Price – sue buyer for purchase price","Damages – sue for breach of contract"] },
      { heading: "Remedies of the Buyer", bullets: ["Recovery of Price – if paid and seller fails to deliver","Rejection of Goods – for breach of condition","Damages for Non-Delivery – seller wrongfully refuses to deliver","Specific Performance – court compels seller to deliver"] }
    ]
  },
  {
    id: 5, title: "Hire Purchase Law", emoji: "🚗", color: "#003049", accent: "#fcbf49",
    sections: [
      { heading: "Definition & Governing Law", content: "Governed by Common Law and Hire Purchase Act 1965 (CAP 169 Vol.9). HP Act applies to HP price of ₦2,000 or less AND all motor vehicles. Common Law governs other goods above ₦2,000." },
      { heading: "What is Hire Purchase?", content: "A contract where an owner lets goods to a hirer for agreed periodic payments with the option (not obligation) to buy. Key case: Helby v Mathews – hirer could return piano, so had no title to pledge with pawnbroker." },
      { heading: "3 Principal Characteristics", bullets: ["It is a form of BAILMENT (bailor = owner, bailee = hirer)","Hirer has OPTION, not obligation, to purchase (J. Allen & Co. v Adewale Sanni)","Title/property stays with OWNER until hirer exercises option to buy"] },
      { heading: "Hire Purchase vs. Sale of Goods", bullets: ["HP: periodic payments only, no obligation to pay full price; Sale: buyer must pay agreed price","HP: title stays with owner until option exercised; Sale: title passes at time of contract","HP: hirer can return goods at any time; Sale: buyer cannot return goods","HP: owner can repossess on default; Sale: seller has no such repossession right","HP: must comply with formalities under HP Act; Sale: no formalities required"] },
      { heading: "Obligations of OWNER", bullets: ["Deliver the goods","Have title at time of contract and commencement of hiring","Goods must correspond with description","Goods reasonably fit for purpose (implied condition)","Warranty of quiet possession","Right to sell on exercise of option (s.4 HP Act)","Duty to supply information on request (s.6 HP Act)"] },
      { heading: "Obligations of HIRER", bullets: ["Accept delivery of goods","Pay installments (ATERE v AMAO 1957 – even ₦10 balance led to lawful seizure)","Take reasonable care of goods (including repairs)","Re-deliver goods if option to terminate is exercised","Not to deal with goods inconsistently with owner's title (no pledging/selling)"] },
      { heading: "Repossession by Owner", bullets: ["If hirer defaults in payment of installments (absolute at Common Law; by court action under HP Act 1965)","Relief refused if default spans 3 consecutive installments for motor vehicle (s.9 HP Act)","When hirer terminates hiring (not by exercising purchase option)"] },
      { heading: "Termination of Hire Purchase Contract", bullets: ["By Performance","By Notice to terminate","By Agreement of both parties","By Repudiation","By Frustration","By Judgment of Court"] },
      { heading: "Remedies", bullets: ["OWNER: sue for refusal to take delivery; sue for damages; retake/seize goods","HIRER: reject goods; sue for damages; repudiate contract and claim damages; sue for conversion and detinue"] }
    ]
  }
];

let activeIndex = 0;
let openSections = {};

function getCSSVars(topic) {
  return `--color: ${topic.color}; --accent: ${topic.accent};`;
}

function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = topics.map((t, i) => `
    <button class="tab-btn ${i === activeIndex ? 'active' : ''}"
      style="${getCSSVars(t)}"
      onclick="switchTopic(${i})">
      ${t.emoji} ${t.title}
    </button>
  `).join('');
}

function renderTopic() {
  const topic = topics[activeIndex];
  document.getElementById('topic-emoji').textContent = topic.emoji;
  document.getElementById('topic-title').textContent = topic.title;
  document.getElementById('topic-title').style.color = topic.accent;
  document.getElementById('topic-sub').textContent = `Tap any section to expand · ${topic.sections.length} topics`;

  const container = document.getElementById('sections');
  container.style.setProperty('--color', topic.color);
  container.style.setProperty('--accent', topic.accent);

  container.innerHTML = topic.sections.map((sec, i) => {
    const isOpen = openSections[i] !== undefined ? openSections[i] : i === 0;
    const defHTML = sec.content
      ? `<div class="def-box" style="border-left: 3px solid ${topic.accent};">${sec.content}</div>`
      : '';
    const bulletsHTML = sec.bullets
      ? `<ul class="bullet-list">${sec.bullets.map(b =>
          `<li><span class="bullet-arrow" style="color:${topic.accent}">›</span><span class="bullet-text">${b}</span></li>`
        ).join('')}</ul>`
      : '';
    return `
      <div class="section-card ${isOpen ? 'open' : ''}" style="${getCSSVars(topic)}" id="card-${i}">
        <button class="section-btn ${isOpen ? 'open' : ''}" onclick="toggleSection(${i})" style="${getCSSVars(topic)}">
          <span>📌 ${sec.heading}</span>
          <span class="toggle">${isOpen ? '−' : '+'}</span>
        </button>
        <div class="section-body ${isOpen ? 'open' : ''}" id="body-${i}">
          ${defHTML}${bulletsHTML}
        </div>
      </div>
    `;
  }).join('');
}

function toggleSection(i) {
  const current = openSections[i] !== undefined ? openSections[i] : i === 0;
  openSections[i] = !current;
  renderTopic();
}

function switchTopic(i) {
  activeIndex = i;
  openSections = {};
  renderTabs();
  renderTopic();
}

// Init
renderTabs();
renderTopic();
</script>
</body>
</html>
